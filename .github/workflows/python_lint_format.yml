name: Python Lint and Format

on:
  # workflow_dispatch:
  # push:
  #   branches:
  #     - 'main'
  #   paths:
  #     - '**.py'
  pull_request:
    branches:
      - 'main'
    paths:
      - '**.py'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  python_lint_format:
    # Only run on non-draft PRs
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Lint. Pin the ruff version explicitly so CI is deterministic (requirements-cpu.txt
    # has no ruff pin, so version-file silently fell back to "latest").
    - uses: astral-sh/ruff-action@v3.4.0
      with:
        version: "0.15.16"
        args: check

    # Format (same pinned version)
    - uses: astral-sh/ruff-action@v3.4.0
      with:
        version: "0.15.16"
        args: format --check

